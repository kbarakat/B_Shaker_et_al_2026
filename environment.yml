name: toxicity-admet-predict
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Python 3.9 is the common denominator for CatBoost across macOS Intel,
  # macOS Apple Silicon, Linux, and Windows on conda-forge.
  - python=3.9
  - rdkit=2024.03.5
  - scikit-learn=1.3.2
  - numpy=1.24.3
  - pandas=2.0.3
  - joblib=1.4.2
  - catboost=1.2.5
  - lightgbm=4.5.0
  - xgboost=2.1.4
